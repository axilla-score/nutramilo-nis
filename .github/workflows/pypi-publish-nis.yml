# Publish nutramilo-nis to PyPI on tag push (nis-v*.*.*).
#
# Uses PyPI Trusted Publishing (OIDC) — NO secrets needed.
#
# IMPORTANT: This workflow uses tag prefix `nis-v` to avoid colliding with
# the existing `pypi-publish.yml` (nutramilo-health) which uses `v` prefix.
#
#   Tag                  Workflow that runs
#   ───────────          ──────────────────
#   v1.0.0               nutramilo-health (existing)
#   nis-v1.0.0           nutramilo-nis (this file)        ← production
#   nis-v1.0.0-rc1       nutramilo-nis (this file)        ← TestPyPI smoke test
#
# Setup (one-time, ~5 minutes):
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. "Add a new pending publisher" with these values:
#        PyPI Project Name:    nutramilo-nis
#        Owner:                axilla-score              (your GH username/org)
#        Repository name:      <name of THIS repo>       (e.g. nutramilo-platform)
#        Workflow name:        pypi-publish-nis.yml
#        Environment name:     pypi-nis
#   3. In GitHub: Settings → Environments → New → name `pypi-nis`
#   4. (Optional) Repeat above on test.pypi.org with environment `testpypi-nis`
#
# Trigger:
#   git tag nis-v1.0.0-rc1 && git push origin nis-v1.0.0-rc1   # smoke test (TestPyPI)
#   git tag nis-v1.0.0     && git push origin nis-v1.0.0        # production (PyPI)
name: Publish nutramilo-nis to PyPI

on:
  push:
    tags:
      - "nis-v[0-9]+.[0-9]+.[0-9]+"        # production
      - "nis-v[0-9]+.[0-9]+.[0-9]+-rc*"    # release candidates → TestPyPI
  workflow_dispatch:

concurrency:
  group: pypi-nis-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    working-directory: ./

jobs:
  test:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check nutramilo_nis/
      - name: Run pytest
        run: pytest tests/ -v --tb=short

  build:
    name: Build wheel + sdist
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Resolve version from tag
        id: version
        working-directory: ./
        run: |
          TAG="${GITHUB_REF#refs/tags/nis-v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" =~ - ]]; then
            echo "is_prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Building nutramilo-nis version: $TAG"
      - name: Install build tool
        run: python -m pip install --upgrade build twine
      - name: Build wheel + sdist
        run: python -m build
      - name: Verify distribution integrity
        run: twine check dist/*
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nis-dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    # Pre-release tags (nis-v*.*.*-rc*) → TestPyPI only
    if: ${{ needs.build.outputs.is_prerelease == 'true' }}
    name: Publish to TestPyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: testpypi-nis
      url: https://test.pypi.org/p/nutramilo-nis
    permissions:
      id-token: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nis-dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish-pypi:
    # Production tags (no -rc suffix) → PyPI
    if: ${{ needs.build.outputs.is_prerelease == 'false' }}
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi-nis
      url: https://pypi.org/p/nutramilo-nis
    permissions:
      id-token: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nis-dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    if: ${{ startsWith(github.ref, 'refs/tags/') && needs.build.outputs.is_prerelease == 'false' }}
    name: Create GitHub Release
    needs: [publish-pypi, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nis-dist
          path: dist/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          name: "nutramilo-nis ${{ needs.build.outputs.version }}"
          body: |
            ## Nutramilo Insulin Score (NIS) — v${{ needs.build.outputs.version }}

            Frozen reference implementation of the NIS algorithm.

            **Install:**
            ```bash
            pip install nutramilo-nis==${{ needs.build.outputs.version }}
            ```

            **Cite (required by NOTICE):**
            > Inkov, I. et al. (2026). Nutramilo Insulin Score (NIS):
            > An Open, Macronutrient-Derived Algorithm for Predicting
            > Postprandial Insulinaemic Response. Int J Med Rev Case Rep.
            > DOI: 10.XXXX/ijmrcr.2026.NIS

            **License:** Apache-2.0 + mandatory citation clause (see NOTICE).
            **PyPI:** https://pypi.org/project/nutramilo-nis/${{ needs.build.outputs.version }}/
